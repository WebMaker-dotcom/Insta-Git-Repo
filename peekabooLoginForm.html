<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekaboo Login Form</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f4f8;
      }

      .login-container {
        position: relative;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        width: 350px;
        text-align: center;
        margin-top: 60px; 
      }

      .character {
        position: absolute;
        top: -80px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 120px;
      }

      .face {
        width: 100px;
        height: 100px;
        background: #ffcc80;
        border-radius: 50%;
        margin: 0 auto;
        position: relative;
        box-shadow: inset -5px -5px 15px rgba(0, 0, 0, 0.1);
      }

      .eye {
        width: 24px;
        height: 24px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 35px;
        display: flex;
        justify-content: center; 
        align-items: center; 
        overflow: hidden;
      }

      .pupil {
        width: 10px;
        height: 10px;
        background: #333;
        border-radius: 50%;
      }

      .left-eye {
        left: 20px;
      }
      .right-eye {
        right: 20px;
      }

      .hand {
        width: 35px;
        height: 35px;
        background: #ffcc80;
        border-radius: 50%;
        position: absolute;
        bottom: -10px;
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        z-index: 10;
      }

      .hand-left {
        left: 10px;
      }
      .hand-right {
        right: 10px;
      }

      .login-form h2 {
        margin-bottom: 25px;
        color: #333;
      }

      .input-group {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e1e8ed;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
        transition: border-color 0.3s ease;
      }

      input:focus {
        border-color: #5c6bc0;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #5c6bc0;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }

      button:hover {
        background: #3f51b5;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="character">
        <div class="face">
          <div class="eye left-eye">
            <div class="pupil"></div>
          </div>
          <div class="eye right-eye">
            <div class="pupil"></div>
          </div>
        </div>
        <div class="hand hand-left"></div>
        <div class="hand hand-right"></div>
      </div>

      <form class="login-form">
        <h2>Welcome Back</h2>
        <div class="input-group">
          <input
            type="text"
            id="username"
            placeholder="Username"
            autocomplete="off"
          />
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" />
        </div>
        <button type="submit">Login</button>
      </form>
    </div>
    <script>
      const passwordInput = document.getElementById("password");
      const leftHand = document.querySelector(".hand-left");
      const rightHand = document.querySelector(".hand-right");
      const eyes = document.querySelectorAll(".eye");

      
      document.addEventListener("mousemove", (e) => {
        eyes.forEach((eye) => {
          
          const rect = eye.getBoundingClientRect();

          const eyeCenterX = rect.left + rect.width / 2;
          const eyeCenterY = rect.top + rect.height / 2;

          const radianAngle = Math.atan2(
            e.clientY - eyeCenterY,
            e.clientX - eyeCenterX,
          );

          
          
          const maxDistance = 7;

          
          const pupilX = Math.cos(radianAngle) * maxDistance;
          const pupilY = Math.sin(radianAngle) * maxDistance;

       
          const pupil = eye.querySelector(".pupil");
          pupil.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
        });
      });

      
      passwordInput.addEventListener("focus", () => {
        leftHand.style.transform = "translateY(-70px) translateX(20px)";
        rightHand.style.transform = "translateY(-70px) translateX(-20px)";
      });

      passwordInput.addEventListener("blur", () => {
        leftHand.style.transform = "translateY(0) translateX(0)";
        rightHand.style.transform = "translateY(0) translateX(0)";
      });
    </script>
  </body>
</html>
